<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First AWS Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 600px;
            width: 90%;
        }

        .rocket {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #b8b8d4;
            margin-bottom: 30px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .info-box p {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.95rem;
        }

        .info-box p:last-child {
            border-bottom: none;
        }

        .label {
            color: #ffd93d;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="rocket">🚀</div>
        <h1>Hello, I'm Pranav!</h1>
        <p class="subtitle">This website is hosted on AWS S3</p>

        <div class="info-box">
            <p><span class="label">☁️ Service:</span> Amazon S3</p>
            <p><span class="label">📍 Region:</span> ap-south-1 (Mumbai)</p>
            <p><span class="label">📅 Deployed:</span> Day 1 of Cloud Journey</p>
            <p><span class="label">🎯 Type:</span> Static Website Hosting</p>
        </div>

        <button class="btn" onclick="celebrate()">Click to Celebrate! 🎉</button>

        <div id="message" style="margin-top: 20px; font-size: 1.2rem;"></div>

        <p class="footer">Built with ❤️ while learning AWS</p>
    </div>

    <script>
        function celebrate() {
            const messages = [
                "🎉 First AWS deployment complete!",
                "☁️ Cloud Engineer in the making!",
                "💪 Day 1 done, many more to go!",
                "🔥 S3 hosting mastered!",
                "⚡ You're unstoppable!"
            ];
            const random = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById('message').textContent = random;
        }
    </script>
</body>
</html>
